<!DOCTYPE html> <!-- Define que o documento é HTML5 -->
<html lang="pt-BR"> <!-- Início do documento HTML e define o idioma como português do Brasil -->

<head> <!-- Cabeçalho do site (configurações que não aparecem diretamente na página) -->

    <meta charset="UTF-8"> <!-- Define a codificação de caracteres para suportar acentos e caracteres especiais -->
    <title>Meu Site</title> <!-- Título da página que aparece na aba do navegador -->

</head>

<body> <!-- Corpo da página: tudo que aparece visualmente no site -->

    <h1>Olá, eu sou o Rafael 👋</h1> <!-- Título principal da página apresentando o autor -->
    <p>Bem-vindo ao meu site!</p> <!-- Parágrafo de boas-vindas -->
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMSyVbXlfJOaCrNbLKnqXk4Lmzy0dSsVF1xA&s" width="500" height="500" alt="caramelo dancante">  <!-- Imagem exibida na página -->
    <!-- src = endereço da imagem -->
    <!-- width e height = tamanho da imagem -->

</body> <!-- Fim do conteúdo visível da página -->

</html> <!-- Fim do documento HTML -->
